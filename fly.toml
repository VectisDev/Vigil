app = "centinel-engine"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[processes]
  app = "streamlit run dashboard/streamlit_app.py --server.port=8080 --server.address=0.0.0.0 --server.headless=true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
