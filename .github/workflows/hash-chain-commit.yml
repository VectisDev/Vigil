name: Hash Chain Commit

# ponytail: merged export-forensic-trail.yml (Phase 3b) and
# reputation-json-api.yml (Phase 3b continued) into this file —
# all three jobs run daily near midnight UTC with the same setup.
# Re-split if any job needs an independent trigger or permissions.

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  forensic-export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Export reputation events
        run: python src/centinel/federation/export_reputation.py

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: forensic_trail.json
          tag_name: forensic-${{ github.run_number }}-${{ github.run_attempt }}
          name: Forensic Trail Export #${{ github.run_number }}
          body: |
            Automated forensic trail export from reputation events database.

            Generated: ${{ github.event.repository.updated_at }}
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  commit:
    needs: forensic-export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Commit to hash chain
        run: python src/centinel/federation/hash_chain.py

      - name: Push hash chain branch
        run: |
          git push origin data/reputation --force-with-lease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create chain verification
        run: |
          git log data/reputation --oneline -10 > chain-verification.txt
          cat chain-verification.txt

  reputation-api-export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Export reputation as JSON
        run: |
          python -c "
          from pathlib import Path
          from centinel.federation.reputation import ReputationEngine
          import json

          db_path = Path('var/federation_reputation.db')
          engine = ReputationEngine(db_path=db_path)
          data = {
              'exported_at': __import__('datetime').datetime.now(__import__('datetime').timezone.utc).isoformat(),
              'nodes': engine.get_all(),
              'ring_counts': engine.ring_counts(),
          }

          Path('data/reputation').mkdir(parents=True, exist_ok=True)
          with open('data/reputation/nodes.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: Commit JSON API
        run: |
          git config user.name centinel-bot
          git config user.email bot@centinel.local
          git checkout -B data/api
          git add data/reputation/nodes.json
          git commit -m "Reputation API snapshot: $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true
          git push origin data/api --force-with-lease

      - name: Deploy to GitHub Pages (raw.githubusercontent)
        run: |
          echo "Reputation API available at:"
          echo "https://raw.githubusercontent.com/${{ github.repository }}/data/api/data/reputation/nodes.json"
