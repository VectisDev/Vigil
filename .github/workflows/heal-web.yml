name: Heal Web Files

on:
  schedule:
    - cron: "0 6 * * *"   # diario a las 06:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Solo reportar, no restaurar (dry-run)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  heal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
        with:
          fetch-depth: 1

      - uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.11"

      - name: Run healer
        run: |
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then FLAGS="--dry-run"; fi
          python scripts/heal_web.py $FLAGS

      - name: Commit restored files (if any)
        run: |
          git config user.name  "centinel-healer[bot]"
          git config user.email "centinel-healer@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "heal: restore missing/corrupt web files [bot]"
            git push
          else
            echo "Nothing to restore."
          fi
