# CENTINEL — Continuous Poller (unified A + B)
# =============================================
# ponytail: merged poller-A.yml + poller-B.yml into this single file.
# Both slots run the same script; concurrency groups are differentiated
# by ${{ github.event.schedule }} so the 3h overlap is preserved.
# Re-split only if the two slots need different configurations.
#
# Overlap strategy / Estrategia de overlap:
#   Slot A: 00:00, 06:00, 12:00, 18:00 UTC  → runs until 05:30
#   Slot B: 03:00, 09:00, 15:00, 21:00 UTC  → runs until 08:30
#   Overlap A+B: 03:00→05:30, 09:00→11:30, 15:00→17:30, 21:00→23:30
#   Gap: ZERO — at least one poller active at all times ✅
#
# Public repo → UNLIMITED Actions minutes ✅

name: centinel-poller

on:
  schedule:
    # Slot A: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
    # Slot B: 03:00, 09:00, 15:00, 21:00 UTC
    - cron: '0 3,9,15,21 * * *'

  workflow_dispatch:
    inputs:
      interval_minutes:
        description: 'Polling interval in minutes / Intervalo de polling en minutos'
        required: false
        default: '3'
      max_runtime_seconds:
        description: 'Max runtime in seconds / Tiempo máximo en segundos'
        required: false
        default: '19800'

# Each schedule slot gets its own singleton via the cron string.
# cancel-in-progress: false — never kill an active poller job.
concurrency:
  group: centinel-poller-${{ github.event.schedule || 'manual' }}
  cancel-in-progress: false

jobs:
  continuous-poll:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Configure git identity
        run: |
          git config user.name  "centinel-poller-bot"
          git config user.email "centinel-poller-bot@noreply.github.com"

      - name: Check election closed
        run: |
          if [ -f ELECTION_CLOSED ]; then
            echo "ELECTION_CLOSED marker found — poller detenido / stopped"
            exit 0
          fi

      - name: Setup data branch
        run: |
          git fetch origin data:data 2>/dev/null || \
            git checkout --orphan data-init && \
            git commit --allow-empty -m "init: data branch" && \
            git push origin HEAD:data && \
            git checkout main || true

      - name: Run continuous poller
        env:
          POLL_INTERVAL:   ${{ inputs.interval_minutes || '3' }}
          MAX_RUNTIME:     ${{ inputs.max_runtime_seconds || '19800' }}
          DATA_BRANCH:     "data"
          ENDPOINTS_JSON:  ${{ secrets.ENDPOINTS_JSON }}
          GH_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
        run: |
          python src/centinel/core/poller_async.py \
            --interval    $POLL_INTERVAL \
            --max-runtime $MAX_RUNTIME \
            --data-branch $DATA_BRANCH

      - name: Summary on exit
        if: always()
        run: |
          echo "=== Poller exit summary (slot: ${{ github.event.schedule || 'manual' }}) ==="
          if [ -f data/latest_cycle.json ]; then
            python3 -c "
          import json
          d = json.load(open('data/latest_cycle.json'))
          ok = sum(1 for r in d['results'] if r['success'])
          print(f\"Last cycle: {d['cycle']} | hash: {d['cycle_hash'][:16]} | ok: {ok}/{len(d['results'])}\")
            "
          fi
          if [ -f data/poller_chain.jsonl ]; then
            echo "Chain entries: $(wc -l < data/poller_chain.jsonl)"
          fi
