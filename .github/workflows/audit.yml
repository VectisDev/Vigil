name: Vigilante Electoral Permanente

permissions:
  contents: write
  actions: read
  issues: write

on:
  workflow_dispatch:
    inputs:
      election_mode:
        description: 'Modo noche electoral — captura cada 30 min en vez de 3 horas (actívalo antes de la noche electoral)'
        type: boolean
        default: false
  schedule:
    - cron: '0 */3 * * *'  # Cada 3 horas (cambia a '*/30 * * * *' para pruebas)

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar snapshot y hash
        run: python -m scripts.download_and_hash

      - name: Ejecutar diffs si aplica
        run: python scripts/calculate_diffs.py || echo "No hay suficientes snapshots para diffs"

      - name: Commit y push con resiliencia (3 intentos)
        id: git_push
        run: |
          git config user.name "AuditHN Bot"
          git config user.email "bot@audithn.org"

          git add data/ hashes/ diffs/ reports/

          if git diff --cached --quiet; then
            echo "Sin cambios reales, no se commitea"
            echo "pushed=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          git commit -m "Actualización automática: snapshot y diffs $(date +'%Y-%m-%d %H:%M')"

          # Intento 1: rebase normal
          if git pull --rebase origin main && git push origin main; then
            echo "pushed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Intento 2: abortar rebase, aplicar snapshot encima de origin/main
          echo "WARN: rebase falló — intento 2: fetch+reset+recomit"
          git rebase --abort 2>/dev/null || true
          git fetch origin main
          git reset --hard origin/main
          git add data/ hashes/ diffs/ reports/
          git diff --cached --quiet || git commit -m "Actualización automática: snapshot y diffs $(date +'%Y-%m-%d %H:%M')"
          if git push origin main; then
            echo "pushed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Intento 3: force-with-lease (snapshot local prevalece)
          echo "WARN: intento 2 falló — intento 3: force-with-lease"
          if git push --force-with-lease origin main; then
            echo "pushed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "WARN: git push falló en los 3 intentos — datos preservados localmente para el próximo ciclo"
          echo "pushed=failed" >> $GITHUB_OUTPUT
          exit 0  # No fallar el workflow — el snapshot ya está capturado en disco

      - name: Notificar fallo de git push (ntfy + Issue)
        if: steps.git_push.outputs.pushed == 'failed'
        env:
          CENTINEL_NTFY_TOPIC: ${{ secrets.CENTINEL_NTFY_TOPIC }}
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            // ntfy
            const topic = process.env.CENTINEL_NTFY_TOPIC;
            if (topic) {
              await fetch(`https://ntfy.sh/${topic}`, {
                method: 'POST',
                headers: { 'Priority': 'high', 'Tags': 'warning,floppy_disk' },
                body: `Centinel — git push falló 3 veces en audit. Los datos están en disco y se reintentarán en el próximo ciclo (3h). Revisa el Issue abierto en tu repo.`
              }).catch(() => {});
            }
            // Open Issue (deduplication)
            const existing = await github.rest.issues.listForRepo({
              owner, repo, labels: 'centinel-git-error', state: 'open', per_page: 1
            });
            if (existing.data.length > 0) return;
            await github.rest.issues.create({
              owner, repo,
              title: '⚠️ Error persistente de git push en audit — datos locales no sincronizados',
              labels: ['centinel-git-error'],
              body: [
                '## El workflow `audit.yml` intentó sincronizar datos 3 veces y falló.',
                '',
                '**Los datos capturados están seguros en disco.** Se reintentará en el próximo ciclo (3 horas).',
                '',
                '### Causa probable',
                '',
                '- Conflicto de rama no resoluble (push de otro proceso simultaneo)',
                '- El runner perdió conectividad durante el push',
                '',
                '### Si el error persiste en el próximo ciclo',
                '',
                '1. Verifica que no haya otro proceso escribiendo al mismo branch',
                `2. Revisa los logs: **[→ Actions → Vigilante Electoral](https://github.com/${owner}/${repo}/actions/workflows/audit.yml)**`,
                '3. Solución manual:',
                '   ```bash',
                '   git fetch origin main',
                '   git reset --hard origin/main',
                '   git push --force-with-lease origin main',
                '   ```',
                '',
                '> Este issue se cerrará automáticamente cuando el próximo ciclo complete con éxito.',
              ].join('\n')
            });

      - name: Cerrar issue de git si push fue exitoso
        if: steps.git_push.outputs.pushed == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'centinel-git-error', state: 'open'
            });
            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: '✅ **Resuelto automáticamente.** El siguiente ciclo de audit completó con éxito.'
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, state: 'closed'
              });
            }

      - name: Push data to centinel-data
        if: always()
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          if [ -z "$DATA_REPO_TOKEN" ]; then
            echo "INFO: DATA_REPO_TOKEN not configured — data stays local"
            exit 0
          fi
          git clone "https://x-access-token:${DATA_REPO_TOKEN}@github.com/${REPO_OWNER}/centinel-data.git" /tmp/centinel-data
          [ -d data ]    && cp -r data/.    /tmp/centinel-data/snapshots/ || true
          [ -d hashes ]  && cp -r hashes/.  /tmp/centinel-data/hashes/   || true
          [ -d diffs ]   && cp -r diffs/.   /tmp/centinel-data/diffs/    || true
          [ -d reports ] && cp -r reports/. /tmp/centinel-data/reports/  || true
          cd /tmp/centinel-data
          git config user.name "centinel-bot"
          git config user.email "bot@centinel.app"
          git add .
          git diff --cached --quiet || git commit -m "data: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin main
