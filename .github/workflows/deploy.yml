name: Deploy to Fly.io

# Auto-trigger disabled pending Fly.io infrastructure setup.
# Reactivate by uncommenting the 'push' block once FLY_API_TOKEN
# is configured in repository secrets and the centinel-engine app
# is provisioned on Fly.io.
on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main
  #     - dev-v9

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
