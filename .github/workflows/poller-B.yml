# CENTINEL — Continuous Poller B
# ================================
# Job long-running offset 3h respecto a Poller A.
# Long-running job offset 3h from Poller A.
#
# Estrategia de overlap / Overlap strategy:
#   Poller A: 00:00, 06:00, 12:00, 18:00 UTC  → corre hasta 05:30, 11:30, 17:30, 23:30
#   Poller B: 03:00, 09:00, 15:00, 21:00 UTC  → corre hasta 08:30, 14:30, 20:30, 02:30
#
#   Overlap A+B activos: 03:00→05:30, 09:00→11:30, 15:00→17:30, 21:00→23:30
#   Gap real: CERO — siempre hay al menos un poller activo ✅
#
# Consumo / Consumption:
#   2 jobs × 330 min × 4 arranques/día = 2,640 min/día
#   Repo público → ILIMITADO / Public repo → UNLIMITED ✅

name: centinel-poller-B

on:
  schedule:
    # Arrancar cada 6h en: 03:00, 09:00, 15:00, 21:00 UTC
    # Start every 6h at: 03:00, 09:00, 15:00, 21:00 UTC
    - cron: '0 3,9,15,21 * * *'

  workflow_dispatch:
    inputs:
      interval_minutes:
        description: 'Intervalo de polling en minutos / Polling interval in minutes'
        required: false
        default: '3'
      max_runtime_seconds:
        description: 'Tiempo máximo en segundos / Max runtime in seconds'
        required: false
        default: '19800'

# CRÍTICO: Singleton separado del Poller A
# CRITICAL: Separate singleton from Poller A
concurrency:
  group: centinel-poller-B-singleton
  cancel-in-progress: false

jobs:
  continuous-poll-B:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install aiohttp pyyaml

      - name: Configure git identity
        run: |
          git config user.name  "centinel-poller-bot"
          git config user.email "centinel-poller-bot@noreply.github.com"

      - name: Check election closed
        run: |
          if [ -f ELECTION_CLOSED ]; then
            echo "ELECTION_CLOSED marker found — poller detenido / stopped"
            exit 0
          fi

      - name: Setup data branch
        run: |
          # Snapshots go to a dedicated 'snapshots' branch (separate history).
          # NOTE: this branch CANNOT be named 'data' — that name conflicts with
          # the existing data/reputation ref (git ref namespace: file vs dir).
          git fetch origin snapshots:snapshots 2>/dev/null || \
            (git checkout --orphan snapshots-init && \
             git commit --allow-empty -m "init: snapshots branch" && \
             git push origin HEAD:snapshots && \
             git checkout -) || true

      - name: Run continuous poller B
        env:
          POLL_INTERVAL:      ${{ inputs.interval_minutes || '3' }}
          MAX_RUNTIME:        ${{ inputs.max_runtime_seconds || '19800' }}
          DATA_BRANCH:        "snapshots"
          ENDPOINTS_JSON:     ${{ secrets.ENDPOINTS_JSON }}
          GH_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
        run: |
          python src/centinel/core/poller_async.py \
            --interval    $POLL_INTERVAL \
            --max-runtime $MAX_RUNTIME \
            --data-branch $DATA_BRANCH \
            --allow-no-endpoints

      - name: Summary on exit
        if: always()
        run: |
          echo "=== Poller B exit summary ==="
          if [ -f data/latest_cycle.json ]; then
            python3 -c "
          import json
          d = json.load(open('data/latest_cycle.json'))
          ok = sum(1 for r in d['results'] if r['success'])
          print(f\"Last cycle: {d['cycle']} | hash: {d['cycle_hash'][:16]} | ok: {ok}/{len(d['results'])}\")
            "
          fi
          if [ -f data/poller_chain.jsonl ]; then
            echo "Chain entries: $(wc -l < data/poller_chain.jsonl)"
          fi
