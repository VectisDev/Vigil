name: OTS Anchor

# Anchor the current hash chain root to Bitcoin via OpenTimestamps.
# Triggered manually (workflow_dispatch) or by pushing to logs/triggers/ots-anchor.
# Commits the .ots receipt to logs/anchors/ots/ for later verification with `ots verify`.
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual anchor (logged in metadata)'
        required: false
        default: 'manual-ots-anchor'
  push:
    branches:
      - main
    paths:
      - 'logs/triggers/ots-anchor'

permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Stamp chain root to Bitcoin via OpenTimestamps
        id: stamp
        run: |
          python scripts/ots_stamp_chain.py && echo "anchored=true" >> $GITHUB_OUTPUT || echo "anchored=false" >> $GITHUB_OUTPUT

      - name: Commit OTS receipt to repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REASON: ${{ github.event.inputs.reason || 'push-triggered-anchor' }}
          ANCHORED: ${{ steps.stamp.outputs.anchored }}
        run: |
          git config user.name "vigil-ots-bot"
          git config user.email "vigil@users.noreply.github.com"
          git add logs/anchors/ots/
          if git diff --staged --quiet; then
            echo "No new OTS files to commit."
          else
            git commit -m "$(printf 'chore(ots): anchor chain to Bitcoin via OpenTimestamps [skip ci]\n\nReason: %s\nAnchored: %s\nTriggered by: %s' "${REASON}" "${ANCHORED}" "${{ github.actor }}")"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Summary
        env:
          ANCHORED: ${{ steps.stamp.outputs.anchored }}
          REASON: ${{ github.event.inputs.reason || 'push-triggered-anchor' }}
        run: |
          echo "## OTS Anchor Result" >> $GITHUB_STEP_SUMMARY
          echo "- **Anchored to Bitcoin:** ${ANCHORED}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Reason:** ${REASON}" >> $GITHUB_STEP_SUMMARY
          echo "- **Files:** \`logs/anchors/ots/\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Bitcoin confirmation takes 1-24 hours. Verify with: \`ots verify <file>.ots\`" >> $GITHUB_STEP_SUMMARY
