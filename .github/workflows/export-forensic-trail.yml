name: Export Forensic Trail

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:     # Allow manual trigger

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Export reputation events
        run: python src/centinel/federation/export_reputation.py

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: forensic_trail.json
          tag_name: forensic-${{ github.run_number }}-${{ github.run_attempt }}
          name: Forensic Trail Export #${{ github.run_number }}
          body: |
            Automated forensic trail export from reputation events database.

            Generated: ${{ github.event.repository.updated_at }}
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
