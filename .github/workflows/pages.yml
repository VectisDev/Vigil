name: Deploy web verifier to GitHub Pages

# Manual trigger only. GitHub Pages must be enabled ONCE by a repo admin
# (Settings -> Pages -> Source: "GitHub Actions"). A CI token cannot
# enable Pages itself, so an auto-push trigger only produces a failing
# red check until that one-time human action is done. After enabling
# Pages, run this workflow from the Actions tab ("Run workflow") and it
# will publish web/ at https://<owner>.github.io/centinel-engine/.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
