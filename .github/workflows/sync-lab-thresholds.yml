name: Sync Lab Thresholds

on:
  push:
    branches: [main, dev-v12]
    paths:
      - 'command_center/*.yaml'
      - 'config/prod/rate_limiter.yaml'
      - 'scripts/generate_lab_thresholds.py'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Generate lab-thresholds.json
        run: python scripts/generate_lab_thresholds.py

      - name: Commit and push if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add web/lab-thresholds.json
          git diff --cached --quiet && echo "No changes" || (
            git commit -m "chore: sync lab thresholds from config [skip ci]"
            git push
          )
