# ---------------------------------------------------------------------------
# UPDATED RULES — Z-score threshold changes
# Reglas actualizadas — cambios en umbrales de Z-score
# ---------------------------------------------------------------------------

# Rule 7 — large_numbers_convergence
# CHANGE: z_threshold 3.0 → uses zscore_thresholds.warning (2.576) and .critical (3.291)
# CHANGE: now calls zscore_proportion() from zscore_unified.py
participation_vote_correlation:
  warning_r: 0.70    # NEW: HN2025 r=0.76 — early warning level
  critical_r: 0.85   # VALIDATED: not triggered in HN2025 clean data

large_numbers_convergence:
  min_samples: 30
  min_total_votes: 200
  # z_threshold: 3.0          # REMOVED — now uses unified zscore_thresholds
  zscore_family: proportion    # Family A: SE binomial

# Rule 8 — participation_anomaly_advanced
# CHANGE: hardcoded |Z|>3 → uses zscore_thresholds.critical (3.291)
# CHANGE: now calls zscore_empirical() with ddof=1 (was ddof=0 implicitly)
participation_anomaly_advanced:
  min_turnout_pct: 70   # CALIBRATED HN2025: p1=80% - 10pp buffer (was 40 — incorrect)
  max_turnout_pct: 100  # CALIBRATED HN2025: observed max 99.4% (was 90 — triggers false alarm)
  # z_threshold: 3.0          # REMOVED — was hardcoded in code, now unified
  zscore_family: empirical     # Family B: ddof=1 muestral
  historical_by_department: true

# Rule 10 — granular_anomaly
# CHANGE: Z-score sub-tests now use ddof=1 (was ddof=0)
# CHANGE: Benford sub-test (10e) replaced by benford_canonical batch call
granular_anomaly:
  negative_delta_threshold: 0
  delta_pct_alert: 3.0
  delta_pct_time_window: 30    # minutes
  zscore_threshold: null       # REMOVED — uses unified zscore_thresholds
  zscore_family: empirical     # Family B: ddof=1
  zscore_min_abs_delta: 100
  zscore_min_departments: 5
  # benford_pvalue: 0.05       # REMOVED — now uses benford_canonical
  # benford_min_samples: 50    # REMOVED — now uses benford_canonical (min=30)
  benford_sub_test: benford_canonical  # delegates to unified module
  turnout_min: 0
  turnout_max: 100
  reversal_min_lead_margin: 500
  reversal_time_window: 30     # minutes
  reversal_min_negative_delta: 100
  sum_mismatch_threshold: 1
