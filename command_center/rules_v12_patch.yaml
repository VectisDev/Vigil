# ---------------------------------------------------------------------------
# UNIFIED Z-SCORE THRESHOLDS (replaces hardcoded |Z|>3 across all rules)
# Umbrales de Z-score unificados (reemplazan |Z|>3 hardcodeado)
# ---------------------------------------------------------------------------
zscore_thresholds:
  warning: 2.576       # p < 0.01 two-tailed (was hardcoded 3.0 in some rules)
  critical: 3.291      # p < 0.001 two-tailed (unified with last_digit_uniformity)
  convention: |
    Family A (proportion): SE = sqrt(p0*(1-p0)/n) — for vote shares, turnout rates
    Family B (empirical): s = std(X, ddof=1) — for counts, deltas, absolute values
    See docs/stats/STATISTICAL_CONVENTIONS.md for full specification.

# ---------------------------------------------------------------------------
# BENFORD CANONICAL — 2nd digit (NEW — replaces Rules 1, 2, and 10e)
# Benford canónico — 2do dígito (NUEVO — reemplaza Reglas 1, 2 y 10e)
# ---------------------------------------------------------------------------
benford_canonical:
  enabled: true
  digit: 2                    # 2nd digit per Mebane (2006)
  severity: CRITICAL
  min_samples: 30             # chi² requires ≥30 for valid approximation
  chi_pvalue_critical: 0.01   # 1% significance for CRITICAL
  chi_pvalue_warning: 0.05    # 5% significance for INFO
  mad_warning: 0.006          # calibrated against HN 2025 lognormal simulation
  mad_critical: 0.012         # calibrated against HN 2025 lognormal simulation
  severity_logic: |
    CRITICAL: chi² p < 0.01 AND MAD > 0.012 (dual confirmation)
    WARNING:  chi² p < 0.01 (statistical test required)
    INFO:     chi² p < 0.05 OR MAD > 0.006 (logging only)
    NOMINAL:  otherwise
  references:
    - "Mebane (2006) Election forensics: Vote counts and Benford's law"
    - "Mebane (2010) Fraud in the 2009 presidential election in Iran?"
    - "Nigrini (2012) Benford's Law, Wiley"
  justification_honduras: |
    Vote totals per mesa in Honduras range 200-500 votes. Limited range
    violates 1st-digit Benford premise but satisfies 2BL requirements.
    FP rate < 5% on HN 2025 simulated data (96 trials, n≈200/department).

# ---------------------------------------------------------------------------
# BENFORD 1ST DIGIT — EXPERIMENTAL (demoted from CRITICAL to INFO)
# Benford 1er dígito — EXPERIMENTAL (rebajado de CRITICAL a INFO)
# ---------------------------------------------------------------------------
benford_first_digit_experimental:
  enabled: true
  digit: 1
  max_severity: INFO          # NEVER triggers WARNING or CRITICAL
  min_samples: 30
  chi_pvalue_critical: 0.01
  mad_warning: 0.006
  mad_critical: 0.012
  rationale: |
    Demoted per Deckert, Myagkov & Ordeshook (2011): high false positive
    rate with electoral count data. FP ~8% vs <2% for 2nd digit on HN data.
    Kept for research/logging purposes only.

